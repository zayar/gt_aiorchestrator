name: Deploy GT AI Orchestrator

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: gt-aiorchestrator-production
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_SECRET: ${{ secrets.OPENAI_API_KEY_SECRET }}
          STT_PROVIDER: ${{ vars.STT_PROVIDER }}
        run: |
          set -euo pipefail

          : "${GCP_PROJECT_ID:?Missing GitHub variable GCP_PROJECT_ID}"
          : "${GCP_REGION:?Missing GitHub variable GCP_REGION}"
          : "${CLOUD_RUN_SERVICE:?Missing GitHub variable CLOUD_RUN_SERVICE}"

          if [[ -z "${GCP_SA_KEY:-}" && ( -z "${WORKLOAD_IDENTITY_PROVIDER:-}" || -z "${GCP_SERVICE_ACCOUNT:-}" ) ]]; then
            echo "Configure either GCP_SA_KEY or both WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT." >&2
            exit 1
          fi

          EFFECTIVE_STT_PROVIDER="${STT_PROVIDER:-openai_whisper}"
          if [[ "${EFFECTIVE_STT_PROVIDER}" == "openai_whisper" && -z "${OPENAI_API_KEY:-}" && -z "${OPENAI_API_KEY_SECRET:-}" ]]; then
            echo "OPENAI_API_KEY or OPENAI_API_KEY_SECRET is required when STT_PROVIDER=openai_whisper." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud with Workload Identity Federation
        if: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Authenticate to Google Cloud with service account key
        if: ${{ !(secrets.WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') && secrets.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          set -euo pipefail

          REPOSITORY="${ARTIFACT_REGISTRY_REPOSITORY:-gt-aiorchestrator}"

          if ! gcloud artifacts repositories describe "${REPOSITORY}" \
            --project "${GCP_PROJECT_ID}" \
            --location "${GCP_REGION}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${REPOSITORY}" \
              --project "${GCP_PROJECT_ID}" \
              --location "${GCP_REGION}" \
              --repository-format docker \
              --description "Docker images for GT AI Orchestrator"
          fi

      - name: Build and push container image
        id: image
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          set -euo pipefail

          REPOSITORY="${ARTIFACT_REGISTRY_REPOSITORY:-gt-aiorchestrator}"
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${REPOSITORY}/${CLOUD_RUN_SERVICE}:${GITHUB_SHA}"

          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Deploy to Cloud Run
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
          GT_APICORE_URL: ${{ vars.GT_APICORE_URL }}
          GT_REQUEST_TIMEOUT_MS: ${{ vars.GT_REQUEST_TIMEOUT_MS }}
          GT_CATALOG_CACHE_TTL_MS: ${{ vars.GT_CATALOG_CACHE_TTL_MS }}
          GT_PREVIEW_CACHE_TTL_MS: ${{ vars.GT_PREVIEW_CACHE_TTL_MS }}
          GT_IDEMPOTENCY_TTL_MS: ${{ vars.GT_IDEMPOTENCY_TTL_MS }}
          DEFAULT_TIMEZONE: ${{ vars.DEFAULT_TIMEZONE }}
          REQUEST_BODY_LIMIT: ${{ vars.REQUEST_BODY_LIMIT }}
          LOG_REQUEST_BODIES: ${{ vars.LOG_REQUEST_BODIES }}
          STT_PROVIDER: ${{ vars.STT_PROVIDER }}
          OPENAI_STT_MODEL: ${{ vars.OPENAI_STT_MODEL }}
          STT_TIMEOUT_MS: ${{ vars.STT_TIMEOUT_MS }}
          STT_LOW_CONFIDENCE_THRESHOLD: ${{ vars.STT_LOW_CONFIDENCE_THRESHOLD }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          VERTEX_REGION: ${{ vars.VERTEX_REGION }}
          VERTEX_MODEL: ${{ vars.VERTEX_MODEL }}
          LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS }}
          LLM_MIN_CONFIDENCE_FOR_HINTS: ${{ vars.LLM_MIN_CONFIDENCE_FOR_HINTS }}
          ENABLE_DEBUG_LOGS: ${{ vars.ENABLE_DEBUG_LOGS }}
          GCP_PROJECT_FOR_VERTEX: ${{ vars.GCP_PROJECT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_SECRET: ${{ secrets.OPENAI_API_KEY_SECRET }}
          OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}
        run: |
          set -euo pipefail

          ENV_VARS="GT_APICORE_URL=${GT_APICORE_URL:-https://greattime-api-core-hs6rtohe3q-uc.a.run.app/apicore}"
          ENV_VARS="${ENV_VARS},GT_REQUEST_TIMEOUT_MS=${GT_REQUEST_TIMEOUT_MS:-12000}"
          ENV_VARS="${ENV_VARS},GT_CATALOG_CACHE_TTL_MS=${GT_CATALOG_CACHE_TTL_MS:-300000}"
          ENV_VARS="${ENV_VARS},GT_PREVIEW_CACHE_TTL_MS=${GT_PREVIEW_CACHE_TTL_MS:-900000}"
          ENV_VARS="${ENV_VARS},GT_IDEMPOTENCY_TTL_MS=${GT_IDEMPOTENCY_TTL_MS:-3600000}"
          ENV_VARS="${ENV_VARS},DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE:-Asia/Yangon}"
          ENV_VARS="${ENV_VARS},REQUEST_BODY_LIMIT=${REQUEST_BODY_LIMIT:-8mb}"
          ENV_VARS="${ENV_VARS},LOG_REQUEST_BODIES=${LOG_REQUEST_BODIES:-false}"
          ENV_VARS="${ENV_VARS},STT_PROVIDER=${STT_PROVIDER:-openai_whisper}"
          ENV_VARS="${ENV_VARS},OPENAI_STT_MODEL=${OPENAI_STT_MODEL:-whisper-1}"
          ENV_VARS="${ENV_VARS},STT_TIMEOUT_MS=${STT_TIMEOUT_MS:-20000}"
          ENV_VARS="${ENV_VARS},STT_LOW_CONFIDENCE_THRESHOLD=${STT_LOW_CONFIDENCE_THRESHOLD:-0.68}"
          ENV_VARS="${ENV_VARS},LLM_PROVIDER=${LLM_PROVIDER:-vertex_gemini}"
          ENV_VARS="${ENV_VARS},GCP_PROJECT_ID=${GCP_PROJECT_FOR_VERTEX}"
          ENV_VARS="${ENV_VARS},VERTEX_REGION=${VERTEX_REGION:-${GCP_REGION}}"
          ENV_VARS="${ENV_VARS},VERTEX_MODEL=${VERTEX_MODEL:-gemini-2.5-flash}"
          ENV_VARS="${ENV_VARS},LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-10000}"
          ENV_VARS="${ENV_VARS},LLM_MIN_CONFIDENCE_FOR_HINTS=${LLM_MIN_CONFIDENCE_FOR_HINTS:-0.6}"
          ENV_VARS="${ENV_VARS},ENABLE_DEBUG_LOGS=${ENABLE_DEBUG_LOGS:-false}"

          if [[ -n "${OPENAI_ORG_ID:-}" ]]; then
            ENV_VARS="${ENV_VARS},OPENAI_ORG_ID=${OPENAI_ORG_ID}"
          fi

          EXTRA_ARGS=""
          if [[ -n "${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT:-}" ]]; then
            EXTRA_ARGS="${EXTRA_ARGS} --service-account=${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}"
          fi

          if [[ -n "${OPENAI_API_KEY_SECRET:-}" ]]; then
            EXTRA_ARGS="${EXTRA_ARGS} --update-secrets=OPENAI_API_KEY=${OPENAI_API_KEY_SECRET}"
          elif [[ -n "${OPENAI_API_KEY:-}" ]]; then
            ENV_VARS="${ENV_VARS},OPENAI_API_KEY=${OPENAI_API_KEY}"
          fi

          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --image "${IMAGE_URI}" \
            --update-env-vars "${ENV_VARS}" \
            ${EXTRA_ARGS}
